name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # Updated to latest stable Go

      - name: Run GoReleaser
        # UPGRADED from v5 to v6 to support GoReleaser v2
        uses: goreleaser/goreleaser-action@v6 
        with:
          distribution: goreleaser
          # This ensures it pulls the latest v2 binary
          version: latest 
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}